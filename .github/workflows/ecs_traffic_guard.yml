name: Aliyun ECS Traffic Guard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 给予原生 git 提交写入权限
permissions:
  contents: write

jobs:
  check-and-control:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install aliyun-python-sdk-core aliyun-python-sdk-ecs

      - name: 执行流量监控脚本
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_ECS_INSTANCE_ID: ${{ secrets.ALIYUN_ECS_INSTANCE_ID }}
          ALIYUN_REGION_ID: ${{ vars.ALIYUN_REGION_ID || 'cn-hongkong' }}
          TRAFFIC_THRESHOLD_GB: ${{ vars.TRAFFIC_THRESHOLD_GB || '180' }}
        run: python main.py

      - name: 自动保活
        run: |
          # 计算上一次 commit 距离现在的天数
          LAST_COMMIT_SEC=$(git log -1 --format=%ct)
          NOW_SEC=$(date +%s)
          DAYS_DIFF=$(( (NOW_SEC - LAST_COMMIT_SEC) / 86400 ))

          # 距离上次提交超过 30 天时，自动 push 1 次保持活跃
          if [ $DAYS_DIFF -ge 30 ]; then
            echo "检测到已有 $DAYS_DIFF 天未更新代码，执行全自动保活..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            date > .keepalive
            git add .keepalive
            git commit -m "chore: auto keepalive [skip ci]"
            git push
          else
            echo "距离上次提交仅 $DAYS_DIFF 天，暂无保活动作。"
          fi
