name: Aliyun ECS Traffic Guard

on:
  schedule:
    # UTC 时间每 30 分钟运行一次 (每小时的第 0 和 30 分钟)
    - cron: '0,30 * * * *'
  workflow_dispatch: # 允许在 GitHub Actions 界面手动点击运行

jobs:
  check-and-control:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install aliyun-python-sdk-core aliyun-python-sdk-ecs

      - name: 执行流量监控脚本
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID || 'cn-hongkong' }}
          ALIYUN_ECS_INSTANCE_ID: ${{ secrets.ALIYUN_ECS_INSTANCE_ID }}
          TRAFFIC_THRESHOLD_GB: '180'
        run: python main.py
