name: Aliyun ECS Traffic Guard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write # 给予 keepalive-workflow 提交权限

jobs:
  check-and-control:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install aliyun-python-sdk-core aliyun-python-sdk-ecs

      - name: 执行流量监控脚本
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID || 'cn-hongkong' }}
          ALIYUN_ECS_INSTANCE_ID: ${{ secrets.ALIYUN_ECS_INSTANCE_ID }}
          TRAFFIC_THRESHOLD_GB: '180'
        run: python main.py

      # 🛡️ 防封禁 & 防暂停：每 30 天才自动 Commit 一次代码，保持仓库活跃，绝不刷屏
      - name: 保持工作流长期激活 (Keepalive)
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 30 # 30 天没有代码提交时才触发 1 次提交
